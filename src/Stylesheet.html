<style>
  :root {
    --bg: #f7f8fa; --card: #fff; --ink: #1d1c1d; --sub: #616061;
    --line: #e2e2e3; --primary: #007a5a; --primary-d: #006c4f;
    --danger: #c0392b; --pill: #eef3f1;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    line-height: 1.6; font-size: 15px; }
  #app { max-width: 720px; margin: 0 auto; padding: 16px; }
  .topbar { align-items: flex-start; }
  .hd h1 { font-size: 20px; margin: 8px 0 2px; }
  .sub { color: var(--sub); margin: 0 0 12px; }
  .card { background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  h2 { font-size: 16px; margin: 0 0 10px; }
  .hidden { display: none !important; }
  .row { display: flex; gap: 8px; align-items: center; }
  .row.between { justify-content: space-between; }
  .row.end { justify-content: flex-end; }
  .btn { display: inline-block; padding: 10px 16px; border-radius: 8px;
    border: 1px solid transparent; font-size: 14px; font-weight: 600;
    cursor: pointer; text-decoration: none; }
  .btn.primary { background: var(--primary); color: #fff; }
  .btn.primary:hover { background: var(--primary-d); }
  .btn.ghost { background: #fff; color: var(--ink); border-color: var(--line); }
  .btn.small { padding: 6px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: default; }
  .input { width: 100%; padding: 10px; border: 1px solid var(--line);
    border-radius: 8px; font-size: 14px; font-family: inherit; }
  .area { resize: vertical; }
  .howto, .notes { margin: 8px 0; padding-left: 20px; }
  .notes { color: var(--sub); font-size: 13px; }
  .pill { background: var(--pill); color: var(--primary-d);
    padding: 3px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; }
  .userlist { max-height: 280px; overflow-y: auto; margin-top: 10px;
    border: 1px solid var(--line); border-radius: 8px; }
  .uitem { display: flex; gap: 10px; align-items: center; padding: 8px 10px;
    border-bottom: 1px solid var(--line); cursor: pointer; }
  .uitem:last-child { border-bottom: none; }
  .uitem:hover { background: #fafafa; }
  .uitem img { width: 28px; height: 28px; border-radius: 6px; background: #eee; }
  .uitem .meta { flex: 1; min-width: 0; }
  .uitem .nm { font-weight: 600; }
  .uitem .id { color: var(--sub); font-size: 12px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .tb { padding: 5px 12px; border: 1px solid var(--line); background: #fff;
    border-radius: 6px; font-size: 13px; cursor: pointer; }
  .tb:hover { background: #f2f2f2; }
  .hint { color: var(--sub); font-size: 12px; }
  .prevwrap { margin-top: 10px; }
  .prevlabel { font-size: 12px; color: var(--sub); margin: 10px 0 4px; }
  .preview { border: 1px dashed var(--line); border-radius: 8px; padding: 10px;
    min-height: 40px; background: #fcfcfc; white-space: pre-wrap; word-break: break-word; }
  .preview a { color: #1264a3; }
  #testStatus { color: var(--primary); min-height: 1.2em; }
  .kv { display: grid; grid-template-columns: 90px 1fr; gap: 4px 12px; margin: 8px 0; }
  .kv dt { color: var(--sub); } .kv dd { margin: 0; font-weight: 600; }
  .cflist { border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px;
    max-height: 200px; overflow-y: auto; }
  .cflist div { padding: 2px 0; }
  .summary { font-size: 16px; margin-bottom: 10px; }
  .summary .ok { color: var(--primary); font-weight: 700; }
  .summary .ng { color: var(--danger); font-weight: 700; }
  .failrow { font-size: 13px; color: var(--danger); padding: 2px 0; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1d1c1d; color: #fff; padding: 10px 16px; border-radius: 8px;
    font-size: 14px; z-index: 20; }
  .overlay { position: fixed; inset: 0; background: rgba(255,255,255,.7);
    display: flex; flex-direction: column; gap: 12px; align-items: center;
    justify-content: center; z-index: 30; color: var(--sub); }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--line);
    border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
